<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX README Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* Custom styles if needed, but Tailwind should handle most */
        body { background-color: #f7fafc; }
        .container { max-width: 800px; }
    </style>
</head>
<body class="font-sans antialiased text-gray-800">
    <div class="container mx-auto p-6 bg-white shadow-lg rounded-lg my-10">
        <h1 class="text-4xl font-bold text-center mb-6">APEX README Generator</h1>
        <p class="text-center text-gray-600 mb-8">Professional GitHub READMEs in minutes. Unlock full features now!</p>

        <div id="unlocked-content" class="hidden">
            <p class="text-xl text-green-600 text-center mb-6">Generator is unlocked! Start creating.</p>
            <!-- Form fields would go here in a full implementation -->
            <textarea class="w-full p-4 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 mb-4" rows="10" placeholder="Your generated README will appear here..."></textarea>
            <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">Copy to Clipboard</button>
        </div>

        <div id="paywall-content" class="text-center">
            <h2 class="text-2xl font-semibold mb-4">One-time purchase for lifetime access.</h2>
            <p class="text-3xl font-bold text-blue-600 mb-6">$9.99</p>
            <button id="checkout-button" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-8 rounded-lg text-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50">
                Unlock Now
            </button>
            <p class="mt-4 text-sm text-gray-500">Powered by Stripe.</p>
        </div>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const stripe = Stripe('your_stripe_public_key_here'); // Replace with your actual public key
        const checkoutButton = document.getElementById('checkout-button');
        const paywallContent = document.getElementById('paywall-content');
        const unlockedContent = document.getElementById('unlocked-content');
        
        checkoutButton.addEventListener('click', async () => {
            // In a real app, this would make an API call to your backend
            // to create a Stripe Checkout Session and get its ID.
            // For this minimal example, we simulate success for demonstration.
            const sessionId = 'cs_test_123'; // Placeholder for a session ID

            // Simulate successful payment immediately for the static page
            paywallContent.classList.add('hidden');
            unlockedContent.classList.remove('hidden');
            alert('Payment simulation successful! Generator unlocked.');
            
            // Original flow for Stripe:
            // const { error } = await stripe.redirectToCheckout({
            //     sessionId: sessionId,
            // });
            // if (error) {
            //     console.error("Error during checkout:", error);
            // }
        });
    </script>
</body>
</html>
