<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; width: 100%; margin-bottom: 20px; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        textarea, input[type="text"] { width: calc(100% - 20px); padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        textarea { min-height: 120px; resize: vertical; }
        button { background-color: #007bff; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1rem; transition: background-color 0.2s; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        #output { background-color: #e9ecef; padding: 15px; border-radius: 5px; white-space: pre-wrap; font-family: monospace; border: 1px dashed #ccc; margin-top: 20px; color: #333; overflow-x: auto; max-width: 100%; box-sizing: border-box; }
        .footer { margin-top: auto; padding-top: 20px; color: #888; font-size: 0.9em; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>README Template Generator</h1>

        <label for="projectTitle">Project Title:</label>
        <input type="text" id="projectTitle" value="My Awesome Project">

        <label for="description">Description:</label>
        <textarea id="description">A concise summary of what your project does.</textarea>

        <label for="features">Features (one per line):</label>
        <textarea id="features">- Feature 1
- Feature 2</textarea>

        <label for="installation">Installation:</label>
        <textarea id="installation">bash
git clone https://github.com/your-username/your-project.git
cd your-project
npm install
</textarea>

        <label for="usage">Usage:</label>
        <textarea id="usage">bash
npm start

Explain how to use your project.</textarea>

        <label for="contributing">Contributing:</label>
        <textarea id="contributing">Feel free to open issues or submit pull requests.</textarea>

        <label for="license">License:</label>
        <input type="text" id="license" value="MIT License">

        <button onclick="generateReadme()">Generate README</button>
        <button onclick="copyToClipboard()">Copy to Clipboard</button>

        <h2>Generated Markdown:</h2>
        <pre id="output"></pre>
    </div>
    <div class="footer">&copy; 2023 APEX Products</div>

    <script>
        function generateReadme() {
            const title = document.getElementById('projectTitle').value;
            const description = document.getElementById('description').value;
            const features = document.getElementById('features').value;
            const installation = document.getElementById('installation').value;
            const usage = document.getElementById('usage').value;
            const contributing = document.getElementById('contributing').value;
            const license = document.getElementById('license').value;

            let readmeContent = `# ${title}

## Description
${description}

`;

            if (features) {
                readmeContent += `## Features
${features}

`;
            }
            readmeContent += `## Installation
${installation}

## Usage
${usage}

## Contributing
${contributing}

## License
This project is licensed under the ${license} - see the [LICENSE.md](LICENSE.md) file for details.
`;

            document.getElementById('output').textContent = readmeContent;
        }

        function copyToClipboard() {
            const output = document.getElementById('output');
            navigator.clipboard.writeText(output.textContent).then(() => {
                alert('README copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        // Generate on load
        window.onload = generateReadme;
    </script>
</body>
</html>
